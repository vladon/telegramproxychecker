name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quick-checks:
    name: fmt, clippy, test (no TDLib)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: ci/tdlib-build-fingerprint matches build.rs TD_COMMIT
        run: |
          set -euo pipefail
          a=$(sed -n 's/^const TD_COMMIT: &str = "\(.*\)".*/\1/p' build.rs | head -1)
          b=$(tr -d '[:space:]' < ci/tdlib-build-fingerprint)
          test "$a" = "$b"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --no-default-features --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --no-default-features
