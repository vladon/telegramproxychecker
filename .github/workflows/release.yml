name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version_label:
        description: "Semver for artifact names (e.g. 0.0.99). Digits and dots only — same rule as release tags."
        required: true
        default: "0.0.99"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Allow saving/restoring workflow cache (TDLib cmake tree, Cargo registry).
  actions: write

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Require semver tag or dispatch version (no v prefix)
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_VERSION: ${{ inputs.version_label }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_VERSION"
          else
            TAG="$REF_NAME"
          fi
          if ! printf '%s' "$TAG" | grep -qxE '[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Version must match ^[0-9]+\\.[0-9]+\\.[0-9]+\$ exactly (no v prefix). Got: $TAG"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  # Single matrix; fail-fast off so other legs still finish and upload artifacts.
  build:
    name: Build (${{ matrix.suffix }})
    needs: validate-tag
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - libc: gnu
            suffix: linux-x86_64-gnu
            tdlib_variant: gha-gnu
            rustflags: ""
          - libc: gnu
            suffix: linux-x86_64-gnu-v3
            tdlib_variant: gha-gnu-v3
            rustflags: "-C target-cpu=x86-64-v3"
          - libc: musl
            suffix: linux-x86_64-musl
            tdlib_variant: gha-musl
            rustflags: ""
            static: false
          - libc: musl
            suffix: linux-x86_64-musl-v3
            tdlib_variant: gha-musl-v3
            rustflags: "-C target-cpu=x86-64-v3"
            static: false
          - libc: musl
            suffix: linux-x86_64-musl-static
            tdlib_variant: gha-musl-static
            rustflags: "-C target-feature=+crt-static"
            static: true
          - libc: musl
            suffix: linux-x86_64-musl-v3-static
            tdlib_variant: gha-musl-v3-static
            rustflags: "-C target-feature=+crt-static -C target-cpu=x86-64-v3"
            static: true
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
      MUSL_TARGET_DIR: target/x86_64-unknown-linux-musl/release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android || true

      # TDLib lives under target/tdlib-build-cache/ (see build.rs). Do not rely on rust-cache alone:
      # it prunes target/ and would drop the huge CMake tree.
      - uses: actions/cache@v4
        name: Cache Cargo registry (shared)
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - uses: actions/cache@v4
        name: Cache TDLib cmake + source
        with:
          path: target/tdlib-build-cache
          key: tdlib-${{ runner.os }}-${{ matrix.suffix }}-${{ hashFiles('build.rs', 'rust-toolchain.toml', 'Cross.toml', 'docker/cross-musl.Dockerfile') }}
          restore-keys: |
            tdlib-${{ runner.os }}-${{ matrix.suffix }}-

      - name: Install dependencies (GNU)
        if: matrix.libc == 'gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libssl-dev zlib1g-dev libzstd-dev gperf

      - name: Install host tools (musl)
        if: matrix.libc == 'musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.libc == 'gnu'

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.libc == 'musl'
        with:
          toolchain: 1.94.1
          targets: x86_64-unknown-linux-musl

      - name: Install cross
        if: matrix.libc == 'musl'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Verify Cross.toml musl setup (dockerfile, not pre-build array)
        if: matrix.libc == 'musl'
        run: |
          if grep -qE '^\s*pre-build\s*=' Cross.toml; then
            echo "::error::Cross.toml must not use a pre-build array for musl (repo scripts are not in that image layer). Use docker/cross-musl.Dockerfile only."
            exit 1
          fi
          test -f docker/cross-musl.Dockerfile
          test -f scripts/cross-prebuild-musl.sh
          grep -q 'docker/cross-musl.Dockerfile' Cross.toml

      - name: cargo build --release (GNU)
        if: matrix.libc == 'gnu'
        env:
          TDLIB_BUILD_VARIANT: ${{ matrix.tdlib_variant }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release

      - name: cargo build --release (cross musl)
        if: matrix.libc == 'musl'
        env:
          TDLIB_BUILD_VARIANT: ${{ matrix.tdlib_variant }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          if [ "${{ matrix.static }}" = "true" ]; then
            export OPENSSL_STATIC=1
            export TDLIB_LINK_SSL_STATIC=1
          fi
          cross build --release --target x86_64-unknown-linux-musl

      - name: Patchelf (shared tdjson) / verify static
        if: matrix.libc == 'musl'
        run: |
          chmod +x scripts/find-libtdjson.sh scripts/package-release-artifact.sh scripts/verify-fully-static.sh
          BIN="$MUSL_TARGET_DIR/tg-proxy-check"
          if [ "${{ matrix.static }}" = "true" ]; then
            scripts/verify-fully-static.sh "$BIN"
          else
            TDJSON="$(scripts/find-libtdjson.sh "$MUSL_TARGET_DIR")"
            patchelf --set-rpath '$ORIGIN' "$BIN"
          fi

      - name: Package (GNU)
        if: matrix.libc == 'gnu'
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          chmod +x scripts/package-release-artifact.sh
          NAME="tg-proxy-check-${VERSION}-${{ matrix.suffix }}"
          scripts/package-release-artifact.sh dist "$NAME" target/release/tg-proxy-check

      - name: Package (musl)
        if: matrix.libc == 'musl'
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          chmod +x scripts/package-release-artifact.sh
          NAME="tg-proxy-check-${VERSION}-${{ matrix.suffix }}"
          BIN="$MUSL_TARGET_DIR/tg-proxy-check"
          if [ "${{ matrix.static }}" = "true" ]; then
            scripts/package-release-artifact.sh dist "$NAME" "$BIN"
          else
            TDJSON="$(scripts/find-libtdjson.sh "$MUSL_TARGET_DIR")"
            scripts/package-release-artifact.sh dist "$NAME" "$BIN" "$TDJSON"
          fi

      - uses: actions/upload-artifact@v6
        with:
          name: artifact-${{ matrix.suffix }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub Release
    # Run after builds finish even when the matrix job failed (partial successes still upload).
    # Tag push: release named after the tag. workflow_dispatch: draft release + unique ci-* tag (ref is a branch).
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.build.result != 'skipped' &&
      (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
    needs: [validate-tag, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # If every leg failed before upload, the download step errors; do not fail the job.
      - uses: actions/download-artifact@v7
        continue-on-error: true
        id: download
        with:
          pattern: artifact-*
          path: dist
          merge-multiple: true

      - name: List release files
        run: |
          mkdir -p dist
          ls -la dist/ || true

      - uses: ncipollo/release-action@v1.21.0
        if: hashFiles('dist/*.tar.gz') != '' && github.ref_type == 'tag'
        with:
          allowUpdates: true
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1.21.0
        if: hashFiles('dist/*.tar.gz') != '' && github.event_name == 'workflow_dispatch'
        with:
          tag: ci-${{ inputs.version_label }}-${{ github.run_id }}
          name: CI ${{ inputs.version_label }} (run ${{ github.run_id }})
          draft: true
          commit: ${{ github.sha }}
          artifacts: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: No release assets (all builds failed)
        if: hashFiles('dist/*.tar.gz') == ''
        run: |
          echo "::warning::No artifacts were uploaded; skipping GitHub Release file upload. Fix failing build legs and re-run or add a new tag."
