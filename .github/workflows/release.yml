name: Release

on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Require semver tag (no v prefix)
        id: check
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! printf '%s' "$TAG" | grep -qxE '[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Tag must match ^[0-9]+\\.[0-9]+\\.[0-9]+\$ exactly (no v prefix). Got: $TAG"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  build-gnu:
    name: GNU (${{ matrix.suffix }})
    needs: validate-tag
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x86_64-gnu
            tdlib_variant: gha-gnu
            rustflags: ""
          - suffix: linux-x86_64-gnu-v3
            tdlib_variant: gha-gnu-v3
            rustflags: "-C target-cpu=x86-64-v3"
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config \
            libssl-dev zlib1g-dev libzstd-dev gperf

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo build --release
        env:
          TDLIB_BUILD_VARIANT: ${{ matrix.tdlib_variant }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release

      - name: Package
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          chmod +x scripts/package-release-artifact.sh
          NAME="tg-proxy-check-${VERSION}-${{ matrix.suffix }}"
          scripts/package-release-artifact.sh dist "$NAME" target/release/tg-proxy-check

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.suffix }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  build-musl:
    name: musl (${{ matrix.suffix }})
    needs: validate-tag
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    container:
      image: rust:1.85-alpine3.21
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: linux-x86_64-musl
            tdlib_variant: gha-musl
            rustflags: ""
            static: false
          - suffix: linux-x86_64-musl-v3
            tdlib_variant: gha-musl-v3
            rustflags: "-C target-cpu=x86-64-v3"
            static: false
          - suffix: linux-x86_64-musl-static
            tdlib_variant: gha-musl-static
            rustflags: "-C target-feature=+crt-static"
            static: true
          - suffix: linux-x86_64-musl-v3-static
            tdlib_variant: gha-musl-v3-static
            rustflags: "-C target-feature=+crt-static -C target-cpu=x86-64-v3"
            static: true
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - name: Install Alpine dependencies
        run: |
          apk add --no-cache bash build-base cmake ninja git curl ca-certificates \
            openssl-dev openssl-libs-static zlib-dev zlib-static zstd-dev \
            gperf perl linux-headers pkgconf patchelf

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: cargo build --release
        env:
          TDLIB_BUILD_VARIANT: ${{ matrix.tdlib_variant }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          if [ "${{ matrix.static }}" = "true" ]; then
            export OPENSSL_STATIC=1
            export TDLIB_LINK_SSL_STATIC=1
          fi
          cargo build --release

      - name: Patchelf (shared tdjson) / verify static
        run: |
          chmod +x scripts/find-libtdjson.sh scripts/package-release-artifact.sh scripts/verify-fully-static.sh
          if [ "${{ matrix.static }}" = "true" ]; then
            scripts/verify-fully-static.sh target/release/tg-proxy-check
          else
            TDJSON="$(scripts/find-libtdjson.sh target/release)"
            patchelf --set-rpath '$ORIGIN' target/release/tg-proxy-check
          fi

      - name: Package
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          NAME="tg-proxy-check-${VERSION}-${{ matrix.suffix }}"
          if [ "${{ matrix.static }}" = "true" ]; then
            scripts/package-release-artifact.sh dist "$NAME" target/release/tg-proxy-check
          else
            TDJSON="$(scripts/find-libtdjson.sh target/release)"
            scripts/package-release-artifact.sh dist "$NAME" target/release/tg-proxy-check "$TDJSON"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.suffix }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub Release
    needs: [validate-tag, build-gnu, build-musl]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
