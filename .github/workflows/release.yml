name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version_label:
        description: "Semver for artifact names (e.g. 0.0.99). Digits and dots only — same rule as release tags."
        required: true
        default: "0.0.99"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Allow saving/restoring workflow cache (TDLib cmake tree, Cargo registry).
  actions: write

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Require semver tag or dispatch version (no v prefix)
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_VERSION: ${{ inputs.version_label }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$DISPATCH_VERSION"
          else
            TAG="$REF_NAME"
          fi
          if ! printf '%s' "$TAG" | grep -qxE '[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Version must match ^[0-9]+\\.[0-9]+\\.[0-9]+\$ exactly (no v prefix). Got: $TAG"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  # TDLib: optional download from GitHub Release `tdlib-prebuilt` (see tdlib-prebuilt.yml), then
  # actions/cache, then compile only if the install tree is still missing. Prep artifacts are reused
  # by matrix rows sharing tdlib_cache_group (gnu×2, musl-static×2). Short retention.
  prep-tdlib:
    name: Prep TDLib (${{ matrix.group }})
    needs: validate-tag
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - group: gnu
            libc: gnu
          - group: musl-static
            libc: musl
            static: true
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Scripts executable
        run: chmod +x scripts/tdlib-cmake-install-ready.sh scripts/fetch-tdlib-prebuilt.sh

      - name: TDLib commit (build.rs)
        id: td_pin
        shell: bash
        run: |
          echo "commit=$(sed -n 's/^const TD_COMMIT: &str = "\(.*\)".*/\1/p' build.rs | head -1)" >> "$GITHUB_OUTPUT"

      - name: Try TDLib prebuilt from release tdlib-prebuilt
        id: prebuilt
        shell: bash
        run: scripts/fetch-tdlib-prebuilt.sh "${{ github.repository }}" "${{ matrix.group }}" "${{ steps.td_pin.outputs.commit }}"

      - uses: ./.github/actions/release-build-env
        with:
          libc: ${{ matrix.libc }}
          tdlib-cache-group: ${{ matrix.group }}

      - name: TDLib install tree ready?
        id: tdlib_ready
        shell: bash
        run: |
          if scripts/tdlib-cmake-install-ready.sh "${{ matrix.group }}"; then
            echo "need=false" >> "$GITHUB_OUTPUT"
          else
            echo "need=true" >> "$GITHUB_OUTPUT"
          fi

      - name: cargo build --release (GNU — drives TDLib once)
        if: matrix.libc == 'gnu' && steps.tdlib_ready.outputs.need == 'true'
        env:
          TDLIB_BUILD_VARIANT: gha-gnu
        run: cargo build --release

      - name: cross build --release (musl — drives TDLib once)
        if: matrix.libc == 'musl' && steps.tdlib_ready.outputs.need == 'true'
        env:
          TDLIB_BUILD_VARIANT: gha-musl-static
        run: |
          if [ "${{ matrix.static }}" = "true" ]; then
            export OPENSSL_STATIC=1
            export TDLIB_LINK_SSL_STATIC=1
          fi
          cross build --release --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v6
        name: Upload TDLib tree for matrix reuse
        with:
          name: tdlib-prep-${{ matrix.group }}
          path: target/tdlib-build-cache
          retention-days: 3

  # Single matrix; fail-fast off so other legs still finish and upload artifacts.
  build:
    name: Build (${{ matrix.suffix }})
    needs: [validate-tag, prep-tdlib]
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - libc: gnu
            suffix: linux-x86_64-gnu
            tdlib_variant: gha-gnu
            tdlib_cache_group: gnu
            rustflags: ""
          - libc: gnu
            suffix: linux-x86_64-gnu-v3
            tdlib_variant: gha-gnu-v3
            tdlib_cache_group: gnu
            rustflags: "-C target-cpu=x86-64-v3"
          - libc: musl
            suffix: linux-x86_64-musl-static
            tdlib_variant: gha-musl-static
            tdlib_cache_group: musl-static
            rustflags: "-C target-feature=+crt-static"
            static: true
          - libc: musl
            suffix: linux-x86_64-musl-v3-static
            tdlib_variant: gha-musl-v3-static
            tdlib_cache_group: musl-static
            rustflags: "-C target-feature=+crt-static -C target-cpu=x86-64-v3"
            static: true
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
      MUSL_TARGET_DIR: target/x86_64-unknown-linux-musl/release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: ./.github/actions/release-build-env
        with:
          libc: ${{ matrix.libc }}
          tdlib-cache-group: ${{ matrix.tdlib_cache_group }}
          run-toolchain: "false"

      # Overlay prep job output so two gnu or two musl-static rows never both compile TDLib in one run.
      - uses: actions/download-artifact@v7
        name: TDLib from prep job
        with:
          name: tdlib-prep-${{ matrix.tdlib_cache_group }}
          path: target/tdlib-build-cache

      - uses: ./.github/actions/release-build-env
        with:
          libc: ${{ matrix.libc }}
          tdlib-cache-group: ${{ matrix.tdlib_cache_group }}
          run-disk-and-caches: "false"

      - name: cargo build --release (GNU)
        if: matrix.libc == 'gnu'
        env:
          TDLIB_BUILD_VARIANT: ${{ matrix.tdlib_variant }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release

      - name: cargo build --release (cross musl)
        if: matrix.libc == 'musl'
        env:
          TDLIB_BUILD_VARIANT: ${{ matrix.tdlib_variant }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          if [ "${{ matrix.static }}" = "true" ]; then
            export OPENSSL_STATIC=1
            export TDLIB_LINK_SSL_STATIC=1
          fi
          cross build --release --target x86_64-unknown-linux-musl

      - name: Verify static musl binary
        if: matrix.libc == 'musl'
        run: |
          chmod +x scripts/verify-fully-static.sh
          scripts/verify-fully-static.sh "$MUSL_TARGET_DIR/tg-proxy-check"

      - name: Package (GNU)
        if: matrix.libc == 'gnu'
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          chmod +x scripts/package-release-artifact.sh
          NAME="tg-proxy-check-${VERSION}-${{ matrix.suffix }}"
          scripts/package-release-artifact.sh dist "$NAME" target/release/tg-proxy-check

      - name: Package (musl)
        if: matrix.libc == 'musl'
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          chmod +x scripts/package-release-artifact.sh
          NAME="tg-proxy-check-${VERSION}-${{ matrix.suffix }}"
          BIN="$MUSL_TARGET_DIR/tg-proxy-check"
          scripts/package-release-artifact.sh dist "$NAME" "$BIN"

      - uses: actions/upload-artifact@v6
        with:
          name: artifact-${{ matrix.suffix }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub Release
    # Run after builds finish even when the matrix job failed (partial successes still upload).
    # Tag push: release named after the tag. workflow_dispatch: draft release + unique ci-* tag (ref is a branch).
    if: >
      always() &&
      needs.validate-tag.result == 'success' &&
      needs.build.result != 'skipped' &&
      (github.ref_type == 'tag' || github.event_name == 'workflow_dispatch')
    needs: [validate-tag, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # If every leg failed before upload, the download step errors; do not fail the job.
      - uses: actions/download-artifact@v7
        continue-on-error: true
        id: download
        with:
          pattern: artifact-*
          path: dist
          merge-multiple: true

      - name: List release files
        run: |
          mkdir -p dist
          ls -la dist/ || true

      - uses: ncipollo/release-action@v1.21.0
        if: hashFiles('dist/*.tar.gz') != '' && github.ref_type == 'tag'
        with:
          allowUpdates: true
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ncipollo/release-action@v1.21.0
        if: hashFiles('dist/*.tar.gz') != '' && github.event_name == 'workflow_dispatch'
        with:
          tag: ci-${{ inputs.version_label }}-${{ github.run_id }}
          name: CI ${{ inputs.version_label }} (run ${{ github.run_id }})
          draft: true
          commit: ${{ github.sha }}
          artifacts: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: No release assets (all builds failed)
        if: hashFiles('dist/*.tar.gz') == ''
        run: |
          echo "::warning::No artifacts were uploaded; skipping GitHub Release file upload. Fix failing build legs and re-run or add a new tag."
