# Used by `cross` for release musl builds (GitHub Actions). Host is glibc; target is musl so
# proc-macros build for the host while the final binary is musl-linked.
[build.env]
passthrough = [
    "TDLIB_BUILD_VARIANT",
    "TDLIB_CMAKE_CACHE_ID",
    "TDLIB_LINK_SSL_STATIC",
    "OPENSSL_STATIC",
    "RUSTFLAGS",
    # TDLib CMake needs musl OpenSSL/zlib; host apt packages are glibc and are not usable here.
    "OPENSSL_ROOT_DIR=/musl-local",
    "ZLIB_ROOT=/musl-local",
    "PKG_CONFIG_PATH=/musl-local/lib/pkgconfig",
]

# Custom image only — do **not** use a `pre-build = [...]` array that runs `scripts/…` here: that
# hook’s Dockerfile layer has no workspace copy, so `bash scripts/cross-prebuild-musl.sh` always fails.
[target.x86_64-unknown-linux-musl.dockerfile]
file = "docker/cross-musl.Dockerfile"
context = "."
